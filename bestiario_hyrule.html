<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bestiario de Hyrule - Breath of the Wild</title>
  <style>
    :root {
      --ink: #1f2523;
      --muted: #5d6963;
      --paper: #efe4c9;
      --paper-strong: #fff4d8;
      --forest: #162d25;
      --teal: #0f6f72;
      --gold: #b9822f;
      --gold-bright: #d2a24c;
      --rust: #934622;
      --leather: #10211b;
      --leather-2: #2a1b10;
      --plum: #4f365d;
      --blue: #315f86;
      --line: rgba(31, 37, 35, .16);
      --shadow: 0 22px 60px rgba(31, 37, 35, .18);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      overflow-x: hidden;
      background:
        linear-gradient(90deg, rgba(22,45,37,.08) 1px, transparent 1px),
        linear-gradient(rgba(22,45,37,.08) 1px, transparent 1px),
        var(--paper);
      background-size: 34px 34px;
    }

    button,
    a {
      font: inherit;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 18px;
      background: rgba(239, 228, 201, .92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .toolbar-title {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--forest);
    }

    .toolbar-actions {
      display: flex;
      gap: 8px;
    }

    .toolbar button {
      min-height: 34px;
      border: 1px solid rgba(31, 37, 35, .22);
      border-radius: 6px;
      padding: 7px 12px;
      color: var(--ink);
      background: var(--paper-strong);
      cursor: pointer;
    }

    .toolbar button:hover {
      border-color: var(--forest);
    }

    .menu-toggle {
      display: none;
    }

    .book {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 64px;
    }

    .cover {
      min-height: min(900px, calc(100vh - 96px));
      display: grid;
      grid-template-columns: minmax(320px, 520px) minmax(0, 1fr);
      align-items: center;
      gap: 48px;
      margin-bottom: 30px;
      padding: 46px;
      border: 1px solid rgba(210, 162, 76, .42);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 25% 20%, rgba(210, 162, 76, .16), transparent 26%),
        radial-gradient(circle at 78% 72%, rgba(147, 70, 34, .20), transparent 32%),
        linear-gradient(135deg, var(--leather), #07100d 62%, var(--leather-2));
      box-shadow: var(--shadow);
    }

    .cover-book {
      margin: 0;
      position: relative;
      justify-self: center;
      width: min(100%, 430px);
      aspect-ratio: 3 / 4;
      border-radius: 10px;
      overflow: hidden;
      box-shadow:
        0 34px 80px rgba(0, 0, 0, .45),
        0 0 0 1px rgba(210, 162, 76, .38);
      background: #101813;
    }

    .cover-book img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .cover-copy {
      padding: 18px 0;
      color: #f3dfaa;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--gold-bright);
    }

    .eyebrow::before {
      content: "";
      width: 42px;
      height: 2px;
      background: var(--gold-bright);
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-size: clamp(54px, 9vw, 118px);
      line-height: .88;
      letter-spacing: 0;
      color: #f1d18b;
    }

    .cover-subtitle {
      max-width: 650px;
      margin: 24px 0 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(18px, 2.3vw, 24px);
      line-height: 1.45;
      color: rgba(255, 244, 216, .78);
    }

    .cover-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      max-width: 650px;
      margin-top: 34px;
    }

    .metric {
      border-top: 3px solid var(--gold-bright);
      padding: 12px 0 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    .metric strong {
      display: block;
      font-size: 28px;
      line-height: 1;
      color: #f3dfaa;
    }

    .metric span {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(255, 244, 216, .72);
    }

    .cover-style-note {
      max-width: 620px;
      margin-top: 28px;
      padding: 16px 18px;
      border: 1px solid rgba(210, 162, 76, .34);
      border-radius: var(--radius);
      background: rgba(5, 13, 10, .36);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      line-height: 1.55;
      color: rgba(255, 244, 216, .82);
    }

    .cover-gallery {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      align-items: stretch;
    }

    .cover-tile {
      min-height: 178px;
      border: 1px solid rgba(31, 37, 35, .18);
      border-radius: var(--radius);
      background: rgba(255, 250, 240, .72);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .cover-tile img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 18px;
      display: block;
    }

    .cover-tile.large {
      grid-row: span 2;
      min-height: 368px;
      background: #e9f0df;
    }

    .section-nav {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
      margin: 0 0 30px;
      font-family: Arial, Helvetica, sans-serif;
    }

    .section-nav a {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px;
      border: 1px solid rgba(31, 37, 35, .18);
      border-radius: 6px;
      color: var(--forest);
      background: rgba(255, 244, 216, .82);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .06em;
      line-height: 1.2;
      text-decoration: none;
      text-transform: uppercase;
    }

    .section-nav a:hover {
      border-color: var(--gold);
    }

    .chapter {
      margin-top: 34px;
      padding-top: 28px;
      border-top: 3px double rgba(31, 37, 35, .24);
    }

    .chapter-heading {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    .chapter h2 {
      margin: 0;
      color: var(--forest);
      font-size: clamp(28px, 4vw, 46px);
      letter-spacing: 0;
    }

    .chapter-count {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .12em;
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .spread {
      position: relative;
      display: grid;
      grid-template-columns: minmax(270px, 420px) minmax(0, 1fr);
      gap: 28px;
      margin: 22px 0;
      padding: 22px;
      border: 1px solid rgba(31, 37, 35, .18);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 244, 216, .94), rgba(246, 232, 196, .90)),
        var(--paper-strong);
      box-shadow: 0 8px 28px rgba(31, 37, 35, .09);
      overflow: hidden;
    }

    .spread::before {
      content: attr(data-number);
      position: absolute;
      top: 12px;
      right: 18px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 54px;
      font-weight: 900;
      line-height: 1;
      color: rgba(31, 37, 35, .07);
    }

    .art-panel {
      min-height: 420px;
      display: grid;
      grid-template-rows: minmax(250px, 1fr) 118px;
      gap: 12px;
    }

    .main-art,
    .extra-art {
      margin: 0;
      border: 1px solid rgba(31, 37, 35, .14);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 20% 20%, rgba(200, 152, 56, .16), transparent 30%),
        rgba(248, 243, 231, .72);
      overflow: hidden;
      cursor: zoom-in;
    }

    .main-art img,
    .extra-art img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      padding: 18px;
    }

    .extra-art {
      display: grid;
      grid-template-columns: 118px minmax(0, 1fr);
      align-items: center;
      background: #eef4ef;
    }

    .extra-art img {
      height: 118px;
      padding: 8px;
    }

    .extra-caption {
      padding: 12px 14px 12px 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
    }

    .entry-body {
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
      padding-right: 18px;
    }

    .category-pill {
      width: fit-content;
      border-radius: 999px;
      padding: 6px 10px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #fff;
      background: var(--forest);
    }

    .entry-body h3 {
      margin: 0;
      font-size: clamp(34px, 4vw, 62px);
      line-height: .95;
      color: var(--ink);
      letter-spacing: 0;
    }

    .summary {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 17px;
      line-height: 1.55;
      color: #37413d;
    }

    .fact-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 4px;
    }

    .fact {
      min-height: 78px;
      padding: 10px 12px;
      border-left: 4px solid var(--gold);
      border-radius: 6px;
      background: rgba(248, 243, 231, .9);
      font-family: Arial, Helvetica, sans-serif;
    }

    .fact b {
      display: block;
      margin-bottom: 5px;
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .fact span {
      display: block;
      font-size: 14px;
      line-height: 1.35;
      color: var(--ink);
    }

    .curio {
      margin: 0;
      padding: 14px 16px;
      border: 1px solid rgba(200, 152, 56, .42);
      border-radius: var(--radius);
      background: #f8e8b8;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 15px;
      line-height: 1.45;
    }

    .curio b {
      color: var(--rust);
    }

    .source-note {
      margin-top: 44px;
      padding: 18px 0 0;
      border-top: 1px solid var(--line);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
    }

    .source-note a {
      color: var(--forest);
    }

    .compact .spread {
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 18px;
    }

    .compact .art-panel {
      min-height: 280px;
      grid-template-rows: 1fr;
    }

    .compact .extra-art {
      display: none;
    }

    .compact .summary {
      font-size: 15px;
    }

    .compact .fact-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    @media (max-width: 980px) {
      .cover {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .cover-gallery {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .cover-tile,
      .cover-tile.large {
        min-height: 160px;
        grid-row: auto;
      }

      .section-nav {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .spread,
      .compact .spread {
        grid-template-columns: 1fr;
      }

      .art-panel {
        min-height: 330px;
      }

      .entry-body {
        padding-right: 0;
      }

      .compact .fact-grid,
      .fact-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .book {
        width: min(100% - 20px, 1180px);
        padding-top: 10px;
      }

      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .cover-meta {
        grid-template-columns: 1fr;
      }

      .cover-gallery {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .section-nav {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .spread {
        padding: 14px;
      }

      .fact-grid {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      @page {
        size: A4;
        margin: 12mm;
      }

      body {
        background: #fff;
      }

      .toolbar,
      .section-nav {
        display: none;
      }

      .book {
        width: 100%;
        padding: 0;
      }

      .cover {
        min-height: 260mm;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 0;
        background: #fff;
        page-break-after: always;
      }

      .cover-copy {
        display: none;
      }

      .cover-book {
        width: 180mm;
        max-width: 100%;
        box-shadow: none;
      }

      .chapter {
        border-top: 0;
        margin-top: 0;
        padding-top: 0;
      }

      .chapter-heading {
        page-break-after: avoid;
      }

      .spread {
        min-height: 252mm;
        margin: 0;
        box-shadow: none;
        page-break-after: always;
        break-after: page;
      }

      .source-note {
        page-break-before: always;
      }
    }

    .toolbar-actions {
      align-items: center;
      flex-wrap: wrap;
    }

    .toolbar button:disabled {
      opacity: .42;
      cursor: default;
    }

    .page-status {
      min-width: 74px;
      padding: 7px 10px;
      border: 1px solid rgba(31, 37, 35, .16);
      border-radius: 6px;
      background: rgba(255, 244, 216, .72);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .06em;
      text-align: center;
      color: var(--forest);
    }

    .book-shell {
      min-height: calc(100vh - 55px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 16px 18px 28px;
    }

    .book-frame {
      position: relative;
      width: min(760px, calc(100vw - 36px), calc((100vh - 98px) * .75));
      aspect-ratio: 3 / 4;
      min-height: 0;
      padding: 14px;
      border: 1px solid rgba(210, 162, 76, .38);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.08), transparent 10%),
        linear-gradient(135deg, #0b1713, #1b2d24 54%, #27190f);
      box-shadow:
        0 34px 90px rgba(17, 23, 20, .32),
        inset 0 0 0 1px rgba(255, 244, 216, .08);
    }

    .book-frame::before {
      content: "";
      position: absolute;
      top: 12px;
      bottom: 12px;
      left: 16px;
      width: 12px;
      border-radius: 999px;
      background:
        linear-gradient(90deg, rgba(0,0,0,.55), rgba(255,255,255,.10), rgba(0,0,0,.42));
      box-shadow:
        10px 0 22px rgba(0, 0, 0, .22),
        -5px 0 12px rgba(210, 162, 76, .15);
    }

    .book-pages {
      position: relative;
      height: 100%;
      perspective: 1800px;
      transform-style: preserve-3d;
      touch-action: pan-y;
      user-select: none;
      cursor: grab;
    }

    .book-pages.is-dragging {
      cursor: grabbing;
    }

    .book-pages.is-dragging .book-page.is-active {
      transform: translateX(var(--drag-x, 0px)) rotateY(var(--drag-tilt, 0deg));
      transition: none;
    }

    .book-pages.is-snapback .book-page.is-active {
      transition: transform .18s ease;
    }

    .book-page {
      position: absolute;
      inset: 0;
      display: grid;
      min-width: 0;
      padding: 24px;
      border: 1px solid rgba(96, 70, 36, .20);
      border-radius: 7px;
      background:
        linear-gradient(90deg, rgba(97, 70, 29, .10), transparent 22px),
        radial-gradient(circle at 18% 12%, rgba(210, 162, 76, .12), transparent 32%),
        linear-gradient(180deg, #fff5dc, #efe0bd);
      box-shadow:
        0 16px 42px rgba(0, 0, 0, .28),
        inset 0 0 0 1px rgba(255, 255, 255, .34);
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transform: rotateY(0);
      transform-origin: left center;
      backface-visibility: hidden;
    }

    .book-page img {
      -webkit-user-drag: none;
      user-select: none;
    }

    .book-page.is-active {
      opacity: 1;
      pointer-events: auto;
      z-index: 2;
    }

    .book-page:not(.is-active):not(.is-leaving):not(.is-entering) {
      visibility: hidden;
    }

    .book-page.is-leaving,
    .book-page.is-entering {
      visibility: visible;
      opacity: 1;
      pointer-events: none;
    }

    .book-page.is-leaving {
      z-index: 5;
      box-shadow:
        0 24px 60px rgba(0, 0, 0, .34),
        inset 0 0 0 1px rgba(255, 255, 255, .24);
    }

    .book-page.is-entering {
      z-index: 3;
    }

    .book-pages.turn-next .book-page.is-leaving {
      transform-origin: left center;
      animation: flipForward .72s cubic-bezier(.2, .72, .18, 1) forwards;
    }

    .book-pages.turn-next .book-page.is-entering {
      animation: pageReveal .72s ease forwards;
    }

    .book-pages.turn-prev .book-page.is-leaving {
      transform-origin: right center;
      animation: flipBackward .72s cubic-bezier(.2, .72, .18, 1) forwards;
    }

    .book-pages.turn-prev .book-page.is-entering {
      animation: pageReveal .72s ease forwards;
    }

    @keyframes flipForward {
      0% {
        opacity: 1;
        transform: rotateY(0);
        filter: brightness(1);
      }
      50% {
        opacity: .94;
        filter: brightness(.86);
      }
      100% {
        opacity: .08;
        transform: rotateY(-118deg);
        filter: brightness(.74);
      }
    }

    @keyframes flipBackward {
      0% {
        opacity: 1;
        transform: rotateY(0);
        filter: brightness(1);
      }
      50% {
        opacity: .94;
        filter: brightness(.88);
      }
      100% {
        opacity: .08;
        transform: rotateY(118deg);
        filter: brightness(.76);
      }
    }

    @keyframes pageReveal {
      0% {
        opacity: .45;
        filter: brightness(.92);
      }
      100% {
        opacity: 1;
        filter: brightness(1);
      }
    }

    .book-page::after {
      content: attr(data-page);
      position: absolute;
      right: 22px;
      bottom: 14px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      color: rgba(31, 37, 35, .42);
    }

    .page-cover {
      place-items: center;
      padding: 0;
      background:
        radial-gradient(circle at 50% 32%, rgba(210, 162, 76, .20), transparent 36%),
        linear-gradient(135deg, #07100d, var(--leather) 58%, #2c1a0d);
    }

    .page-cover::after {
      display: none;
    }

    .cover-book-full {
      width: 100%;
      height: 100%;
      max-width: none;
      aspect-ratio: 3 / 4;
      border-radius: 7px;
      box-shadow: none;
    }

    .cover-book img {
      object-fit: contain;
    }

    .page-index {
      align-content: start;
      gap: 16px;
      padding: 34px;
    }

    .page-kicker {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .page-index h2,
    .page-sources h2 {
      margin: 0;
      color: var(--forest);
      font-size: clamp(36px, 5.6vw, 62px);
      line-height: .92;
      letter-spacing: 0;
    }

    .index-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      max-width: 620px;
      margin: 4px 0 10px;
    }

    .index-stats .metric {
      border-top-color: var(--forest);
    }

    .index-stats .metric strong {
      color: var(--forest);
    }

    .index-stats .metric span {
      color: var(--muted);
    }

    .index-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 9px;
    }

    .index-link {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid rgba(31, 37, 35, .18);
      border-radius: 7px;
      color: var(--forest);
      background: rgba(255, 250, 240, .68);
      text-align: left;
      cursor: pointer;
    }

    .index-link:hover {
      border-color: var(--gold);
      background: rgba(255, 244, 216, .92);
    }

    .index-link strong {
      display: block;
      font-size: 19px;
      line-height: 1.05;
    }

    .index-link span {
      display: block;
      margin-top: 5px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .index-page-number {
      flex: 0 0 auto;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 22px;
      font-weight: 900;
      color: rgba(31, 37, 35, .32);
    }

    .page-entry {
      grid-template-rows: auto minmax(0, 1fr);
      gap: 8px;
    }

    .page-chapter {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 4px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .page-chapter span:last-child {
      color: var(--muted);
    }

    .page-entry .spread {
      height: 100%;
      grid-template-columns: 1fr;
      grid-template-rows: minmax(0, 32%) minmax(0, 1fr);
      gap: 12px;
      margin: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      overflow: visible;
    }

    .page-entry .spread::before {
      display: none;
    }

    .page-entry .art-panel {
      min-height: 0;
      height: 100%;
      grid-template-columns: minmax(0, 1.15fr) minmax(0, .85fr);
      grid-template-rows: 1fr;
      gap: 10px;
    }

    .page-entry .main-art img {
      padding: 14px;
    }

    .page-entry .extra-art {
      display: block;
      min-height: 0;
      background:
        radial-gradient(circle at 50% 42%, rgba(15, 111, 114, .12), transparent 38%),
        #edf4ee;
    }

    .page-entry .extra-art img {
      width: 100%;
      height: 100%;
      padding: 10px;
      object-fit: contain;
      cursor: zoom-in;
    }

    .page-entry .main-art img {
      cursor: zoom-in;
    }

    .extra-caption {
      display: none;
    }

    .page-entry .entry-body {
      gap: 8px;
      justify-content: flex-start;
      padding: 0 8px 2px 0;
      overflow-y: auto;
    }

    .page-entry .entry-body h3 {
      overflow-wrap: anywhere;
      font-size: clamp(20px, 3.3vw, 33px);
      line-height: 1;
    }

    .page-entry .category-pill {
      padding: 4px 7px;
      font-size: 8px;
      letter-spacing: .09em;
    }

    .page-entry .summary {
      font-size: 14px;
      line-height: 1.42;
    }

    .entry-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .entry-number {
      flex: 0 0 auto;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .detail {
      padding: 8px 10px;
      border: 1px solid rgba(31, 37, 35, .13);
      border-radius: 6px;
      background: rgba(255, 250, 240, .62);
      font-family: Arial, Helvetica, sans-serif;
    }

    .detail-wide {
      grid-column: 1 / -1;
    }

    .detail b {
      display: block;
      margin-bottom: 5px;
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .detail span {
      display: block;
      font-size: 12px;
      line-height: 1.3;
      color: #33403b;
    }

    .page-entry .fact {
      min-height: 58px;
      padding: 8px 10px;
    }

    .page-entry .fact span {
      font-size: 12px;
    }

    .page-entry .curio {
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.35;
    }

    .page-sources {
      align-content: center;
      gap: 18px;
      padding: 46px;
    }

    .page-sources .source-note {
      max-width: 760px;
      margin: 0;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      page-break-before: auto;
    }

    .image-lightbox {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 34px;
      background: rgba(4, 9, 7, .88);
    }

    .image-lightbox.is-open {
      display: flex;
    }

    .lightbox-panel {
      position: relative;
      max-width: min(94vw, 1120px);
      max-height: 90vh;
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .lightbox-panel img {
      max-width: min(94vw, 1120px);
      max-height: 84vh;
      display: block;
      object-fit: contain;
      border-radius: 8px;
      background: #fff4d8;
      box-shadow: 0 30px 90px rgba(0, 0, 0, .55);
    }

    .lightbox-close {
      position: absolute;
      top: -18px;
      right: -18px;
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255, 244, 216, .36);
      border-radius: 999px;
      color: #fff4d8;
      background: rgba(16, 33, 27, .96);
      cursor: pointer;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 16px;
      font-weight: 900;
      line-height: 1;
    }

    .lightbox-caption {
      max-width: min(88vw, 760px);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      line-height: 1.35;
      text-align: center;
      color: rgba(255, 244, 216, .82);
    }

    @media (max-width: 900px) {
      body {
        min-height: 100dvh;
      }

      .toolbar {
        position: fixed;
        inset: auto 12px 70px auto;
        z-index: 40;
        display: block;
        width: min(210px, calc(100vw - 24px));
        padding: 8px;
        border: 1px solid rgba(31, 37, 35, .18);
        border-radius: 8px;
        background: rgba(255, 244, 216, .96);
        box-shadow: 0 18px 48px rgba(31, 37, 35, .24);
        opacity: 0;
        pointer-events: none;
        transform: translateY(8px);
        transition: opacity .18s ease, transform .18s ease;
      }

      body.menu-open .toolbar {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }

      .toolbar-title {
        display: none;
      }

      .toolbar-actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .toolbar button,
      .page-status {
        width: 100%;
        min-height: 28px;
        padding: 5px 8px;
        border-radius: 6px;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 11px;
        line-height: 1.1;
      }

      .page-status {
        order: -1;
      }

      .menu-toggle {
        position: fixed;
        right: 14px;
        bottom: 14px;
        z-index: 45;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        width: 42px;
        height: 42px;
        border: 1px solid rgba(255, 244, 216, .38);
        border-radius: 999px;
        color: #fff4d8;
        background: rgba(16, 33, 27, .96);
        box-shadow: 0 12px 34px rgba(31, 37, 35, .34);
        cursor: pointer;
      }

      .menu-toggle span,
      .menu-toggle::before,
      .menu-toggle::after {
        content: "";
        width: 18px;
        height: 2px;
        border-radius: 999px;
        background: currentColor;
      }

      .book-shell {
        width: 100vw;
        max-width: 100vw;
        height: 100dvh;
        min-height: 100dvh;
        align-items: stretch;
        padding: 0;
        overflow: hidden;
      }

      .book-frame {
        width: 100vw;
        height: 100dvh;
        max-width: 100vw;
        max-height: 100dvh;
        aspect-ratio: auto;
        min-height: 0;
        padding: 10px;
        border-radius: 0;
      }

      .book-frame::before {
        left: 8px;
        width: 8px;
      }

      .book-pages {
        height: 100%;
      }

      .book-page {
        position: absolute;
        inset: 0;
        display: grid;
        width: 100%;
        max-width: 100%;
        min-height: 0;
        opacity: 0;
        visibility: hidden;
        transform: none;
      }

      .book-page.is-active {
        opacity: 1;
        visibility: visible;
      }

      .page-cover {
        min-height: 0;
      }

      .page-index,
      .page-sources {
        padding: 28px;
      }

      .index-grid {
        grid-template-columns: 1fr;
      }

      .page-entry {
        padding: 18px;
      }

      .page-entry .spread {
        height: 100%;
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
        width: 100%;
        max-width: 100%;
      }

      .page-entry .art-panel {
        height: auto;
        min-height: 0;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        gap: 8px;
      }

      .page-entry .main-art,
      .page-entry .extra-art {
        width: 100%;
        height: 142px;
        border-radius: 6px;
      }

      .page-entry .main-art img,
      .page-entry .extra-art img {
        width: 100%;
        height: 100%;
        max-height: none;
        padding: 0;
        object-fit: cover;
        object-position: center;
      }
    }

    @media (max-width: 640px) {
      .index-stats {
        grid-template-columns: 1fr;
      }

      .page-entry .fact-grid {
        grid-template-columns: 1fr;
      }

      .page-entry .detail-grid {
        grid-template-columns: 1fr;
      }

      .page-entry .art-panel {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }

      .page-entry .main-art img,
      .page-entry .extra-art img {
        width: 100%;
        height: 100%;
        max-height: none;
        padding: 0;
        object-fit: cover;
      }
    }

    @media print {
      @page {
        size: 180mm 240mm;
        margin: 0;
      }

      body {
        background: #fff;
      }

      .toolbar {
        display: none;
      }

      .image-lightbox {
        display: none !important;
      }

      .book-shell {
        display: block;
        min-height: auto;
        padding: 0;
      }

      .book-frame {
        width: 180mm;
        aspect-ratio: auto;
        height: auto;
        min-height: 0;
        max-height: none;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }

      .book-frame::before {
        display: none;
      }

      .book-pages {
        display: block;
        height: auto;
        perspective: none;
      }

      .book-page,
      .book-page:not(.is-active) {
        position: relative;
        inset: auto;
        display: grid;
        width: 180mm;
        height: 240mm;
        min-height: 0;
        margin: 0;
        padding: 10mm;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        opacity: 1;
        visibility: visible;
        transform: none;
        page-break-after: always;
        break-after: page;
      }

      .book-page::after {
        display: none;
      }

      .page-cover {
        place-items: center;
        min-height: 240mm;
        padding: 0;
        background: #fff;
      }

      .page-cover .cover-book-full {
        width: 180mm;
        height: 240mm;
        max-width: none;
        box-shadow: none;
      }

      .page-entry {
        grid-template-rows: auto minmax(0, 1fr);
        gap: 9mm;
      }

      .page-entry .spread {
        height: 212mm;
        min-height: 0;
        margin: 0;
        page-break-after: auto;
        break-after: auto;
      }

      .page-entry .entry-body {
        overflow: visible;
      }

      .page-sources {
        page-break-after: auto;
        break-after: auto;
      }

      body.print-current .book-page,
      body.print-current .book-page:not(.is-active) {
        display: none !important;
        page-break-after: auto;
        break-after: auto;
      }

      body.print-current .book-page.is-active {
        display: grid !important;
        opacity: 1;
        visibility: visible;
      }

      body.print-all .book-page,
      body.print-all .book-page:not(.is-active) {
        display: grid !important;
      }
    }
  </style>
</head>
<body>
  <header class="toolbar">

        description: "Es una plaga velocisima que usa electricidad, espada y escudo. Muchos jugadores la consideran una de las mas dificiles.",
        variants: "Plaga del trueno.",
        strategy: "Requiere reflejos precisos. En una fase, Link puede usar Magnesis con pilares metalicos para devolverle su propia electricidad.",
        bookIdea: "Puede ser una pagina de rayos y velocidad, casi como un relampago con forma de enemigo."
      },
      "28": {
        type: "Jefe final.",
        description: "Es la forma monstruosa e incompleta de Ganon dentro del Castillo de Hyrule, mezclando Malicia y tecnologia antigua.",
        variants: "Forma de combate principal.",
        strategy: "Usa ataques inspirados en las plagas y en los Guardianes. Las paradas perfectas, las habilidades de los Campeones y la Espada Maestra son muy importantes.",
        bookIdea: "Puede ser el gran enemigo oscuro que resume todos los peligros anteriores."
      },
      "29": {
        type: "Forma final de Ganon.",
        description: "Es una bestia gigantesca de Malicia que se enfrenta en el campo abierto, como una sombra enorme sobre Hyrule.",
        variants: "Forma bestial final.",
        strategy: "Link cabalga, esquiva su rayo y usa el Arco de Luz para disparar a los puntos debiles que Zelda revela.",
        bookIdea: "Es una buena pagina final: grande, luminosa y con sensacion de cierre heroico."
      }
    };

    const bookPages = document.getElementById("bookPages");
    const prevButton = document.getElementById("prevPage");
    const nextButton = document.getElementById("nextPage");
    const printCurrentButton = document.getElementById("printCurrent");
    const printAllButton = document.getElementById("printAll");
    const pageStatus = document.getElementById("pageStatus");
    const menuToggle = document.getElementById("menuToggle");
    const imageLightbox = document.getElementById("imageLightbox");
    const lightboxImage = document.getElementById("lightboxImage");
    const lightboxCaption = document.getElementById("lightboxCaption");
    const lightboxClose = document.getElementById("lightboxClose");
    const sourceHtml = `Proyecto familiar no oficial. Fuente base: <a href="https://es.zeldacentral.com/games/breath-of-the-wild/enemies-and-monsters/">Zelda Central - Enemigos y monstruos</a>. Datos complementarios consultados en <a href="https://api.hyrule-compendium.com/v3/compendium/category/monsters">Hyrule Compendium API</a>, <a href="https://zeldawiki.wiki/wiki/Aerocuda">Zelda Wiki - Aerocuda</a> y <a href="https://zeldawiki.wiki/wiki/Glowing_Eyeball">Zelda Wiki - Glowing Eyeball</a>.`;

    const chapterStarts = new Map();
    const entryPages = [];
    let pageIndex = 2;

    chapters.forEach(chapter => {
      chapterStarts.set(chapter.id, pageIndex);
      chapter.entries.forEach(entry => {
        entryPages.push({ type: "entry", chapter, entry });
        pageIndex += 1;
      });
    });

    const pages = [
      { type: "cover" },
      { type: "index" },
      ...entryPages,
      { type: "sources" }
    ];

    let activePage = 0;
    let isTurning = false;
    let suppressNextClick = false;
    const swipe = {
      pointerId: null,
      startX: 0,
      startY: 0,
      dx: 0,
      dy: 0,
      dragging: false
    };

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function renderCover(index) {
      return `
        <section class="book-page page-cover" data-page="${index + 1}" aria-label="Portada">
          <figure class="cover-book cover-book-full">
            <img src="imagenes/00-portada-bestiario.png" alt="Portada Bestiario de Hyrule">
          </figure>
        </section>
      `;
    }

    function renderIndex(index) {
      const totalEntries = chapters.reduce((sum, chapter) => sum + chapter.entries.length, 0);
      return `
        <section class="book-page page-index" data-page="${index + 1}">
          <div class="page-kicker">Indice de campo</div>
          <h2>Bestiario de Hyrule</h2>
          <div class="index-stats">
            <div class="metric"><strong>${totalEntries}</strong><span>Fichas</span></div>
            <div class="metric"><strong>${totalEntries * 2 + 1}</strong><span>Imagenes</span></div>
            <div class="metric"><strong>${chapters.length}</strong><span>Capitulos</span></div>
          </div>
          <div class="index-grid">
            ${chapters.map(chapter => `
              <button class="index-link" type="button" data-goto="${chapterStarts.get(chapter.id)}">
                <span>
                  <strong>${escapeHtml(chapter.title)}</strong>
                  <span>${chapter.entries.length} fichas</span>
                </span>
                <span class="index-page-number">${chapterStarts.get(chapter.id) + 1}</span>
              </button>
            `).join("")}
          </div>
        </section>
      `;
    }

    function renderEntry(page, index) {
      const { chapter, entry } = page;
      const base = baseInfo[entry.n] || {};
      return `
        <section class="book-page page-entry" data-page="${index + 1}">
          <div class="page-chapter">
            <span>${escapeHtml(chapter.title)}</span>
            <span>Ficha ${escapeHtml(entry.n)}</span>
          </div>
          <article class="spread" data-number="${escapeHtml(entry.n)}">
            <div class="art-panel">
              <figure class="main-art">
                <img src="${escapeHtml(entry.image)}" alt="${escapeHtml(entry.name)}">
              </figure>
              <figure class="extra-art">
                <img src="${escapeHtml(entry.extra)}" alt="${escapeHtml(entry.name)}, imagen extra">
              </figure>
            </div>
            <div class="entry-body">
              <div class="entry-topline">
                <div class="category-pill">${escapeHtml(base.type || entry.category)}</div>
                <div class="entry-number">No. ${escapeHtml(entry.n)}</div>
              </div>
              <h3>${escapeHtml(entry.name)}</h3>
              <p class="summary">${escapeHtml(base.description || entry.summary)}</p>
              <div class="detail-grid">
                <div class="detail"><b>Variantes</b><span>${escapeHtml(base.variants || "Sin variantes registradas.")}</span></div>
                <div class="detail"><b>Como enfrentarlo</b><span>${escapeHtml(base.strategy || "Sin estrategia registrada.")}</span></div>
                <div class="detail detail-wide"><b>Idea para el libro</b><span>${escapeHtml(base.bookIdea || "Sin nota editorial registrada.")}</span></div>
              </div>
              <div class="fact-grid">
                <div class="fact"><b>Compendio</b><span>${escapeHtml(entry.facts.compendium)}</span></div>
                <div class="fact"><b>Donde aparece</b><span>${escapeHtml(entry.facts.places)}</span></div>
                <div class="fact"><b>Materiales</b><span>${escapeHtml(entry.facts.drops)}</span></div>
                <div class="fact"><b>Escala visual</b><span>${escapeHtml(entry.facts.scale)}</span></div>
              </div>
              <p class="curio"><b>Curiosidad:</b> ${escapeHtml(entry.curio)}</p>
            </div>
          </article>
        </section>
      `;
    }

    function renderSources(index) {
      return `
        <section class="book-page page-sources" data-page="${index + 1}">
          <div class="page-kicker">Fuentes</div>
          <h2>Notas del bestiario</h2>
          <footer class="source-note">${sourceHtml}</footer>
        </section>
      `;
    }

    function renderPage(page, index) {
      if (page.type === "cover") return renderCover(index);
      if (page.type === "index") return renderIndex(index);
      if (page.type === "sources") return renderSources(index);
      return renderEntry(page, index);
    }

    function updateControls() {
      pageStatus.textContent = `${activePage + 1} / ${pages.length}`;
      prevButton.disabled = isTurning || activePage === 0;
      nextButton.disabled = isTurning || activePage === pages.length - 1;
    }

    function showPage(index) {
      activePage = Math.max(0, Math.min(index, pages.length - 1));
      Array.from(bookPages.children).forEach((page, pageNumber) => {
        page.classList.remove("is-leaving", "is-entering");
        page.classList.toggle("is-active", pageNumber === activePage);
      });
      bookPages.classList.remove("turn-next", "turn-prev");
      updateControls();
    }

    function setPage(index) {
      const targetPage = Math.max(0, Math.min(index, pages.length - 1));
      if (targetPage === activePage || isTurning) return;

      const oldPage = bookPages.children[activePage];
      const newPage = bookPages.children[targetPage];
      const direction = targetPage > activePage ? "turn-next" : "turn-prev";

      if (!oldPage || !newPage || window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        showPage(targetPage);
        return;
      }

      isTurning = true;
      const oldIndex = activePage;
      activePage = targetPage;
      updateControls();

      bookPages.classList.add(direction);
      newPage.classList.add("is-active", "is-entering");
      oldPage.classList.add("is-leaving");

      const finishTurn = () => {
        oldPage.classList.remove("is-active", "is-leaving");
        newPage.classList.remove("is-entering");
        bookPages.classList.remove("turn-next", "turn-prev");
        isTurning = false;
        updateControls();
      };

      oldPage.addEventListener("animationend", finishTurn, { once: true });
      window.setTimeout(() => {
        if (isTurning && activePage === targetPage && oldIndex !== activePage) finishTurn();
      }, 820);
    }

    function resetSwipeVisuals() {
      bookPages.classList.remove("is-dragging", "is-snapback");
      bookPages.style.removeProperty("--drag-x");
      bookPages.style.removeProperty("--drag-tilt");
    }

    function cancelSwipe() {
      swipe.pointerId = null;
      swipe.dragging = false;
      resetSwipeVisuals();
    }

    function finishSwipe() {
      const width = bookPages.getBoundingClientRect().width || 1;
      const threshold = Math.max(44, Math.min(120, width * .16));
      const isHorizontal = Math.abs(swipe.dx) > Math.abs(swipe.dy) * 1.25;
      const shouldTurn = isHorizontal && Math.abs(swipe.dx) > threshold;
      const targetPage = swipe.dx < 0 ? activePage + 1 : activePage - 1;

      if (shouldTurn && targetPage >= 0 && targetPage < pages.length) {
        resetSwipeVisuals();
        setPage(targetPage);
      } else {
        bookPages.classList.add("is-snapback");
        window.setTimeout(resetSwipeVisuals, 190);
      }

      swipe.pointerId = null;
      swipe.dragging = false;
    }

    function clearPrintMode() {
      document.body.classList.remove("print-current", "print-all");
    }

    function printBook(mode) {
      const pageToPrint = activePage;
      isTurning = false;
      showPage(pageToPrint);
      clearPrintMode();
      document.body.classList.add(mode === "current" ? "print-current" : "print-all");
      window.setTimeout(() => window.print(), 60);
    }

    function openLightbox(image) {
      lightboxImage.src = image.currentSrc || image.src;
      lightboxImage.alt = image.alt || "";
      lightboxCaption.textContent = image.alt || "";
      imageLightbox.classList.add("is-open");
      imageLightbox.setAttribute("aria-hidden", "false");
      lightboxClose.focus();
    }

    function closeLightbox() {
      imageLightbox.classList.remove("is-open");
      imageLightbox.setAttribute("aria-hidden", "true");
      lightboxImage.removeAttribute("src");
      lightboxImage.alt = "";
      lightboxCaption.textContent = "";
    }

    function setMenu(open) {
      document.body.classList.toggle("menu-open", open);
      menuToggle.setAttribute("aria-expanded", open ? "true" : "false");
    }

    bookPages.innerHTML = pages.map(renderPage).join("");
    const urlParams = new URLSearchParams(window.location.search);
    const requestedPage = Number(urlParams.get("page"));
    showPage(Number.isFinite(requestedPage) && requestedPage > 0 ? requestedPage - 1 : 0);
    if (urlParams.get("print") === "current") document.body.classList.add("print-current");
    if (urlParams.get("print") === "all") document.body.classList.add("print-all");
    if (urlParams.get("menu") === "open") setMenu(true);

    menuToggle.addEventListener("click", () => {
      setMenu(!document.body.classList.contains("menu-open"));
    });

    prevButton.addEventListener("click", () => {
      setPage(activePage - 1);
      setMenu(false);
    });
    nextButton.addEventListener("click", () => {
      setPage(activePage + 1);
      setMenu(false);
    });
    printCurrentButton.addEventListener("click", () => {
      setMenu(false);
      printBook("current");
    });
    printAllButton.addEventListener("click", () => {
      setMenu(false);
      printBook("all");
    });

    bookPages.addEventListener("pointerdown", event => {
      if (isTurning || imageLightbox.classList.contains("is-open")) return;
      if (event.target.closest(".main-art, .extra-art")) return;
      if (event.target.closest("button, a, .entry-body")) return;

      swipe.pointerId = event.pointerId;
      swipe.startX = event.clientX;
      swipe.startY = event.clientY;
      swipe.dx = 0;
      swipe.dy = 0;
      swipe.dragging = false;
      bookPages.setPointerCapture?.(event.pointerId);
    });

    bookPages.addEventListener("pointermove", event => {
      if (swipe.pointerId !== event.pointerId || isTurning) return;

      swipe.dx = event.clientX - swipe.startX;
      swipe.dy = event.clientY - swipe.startY;

      if (!swipe.dragging) {
        const enoughMovement = Math.abs(swipe.dx) > 10 || Math.abs(swipe.dy) > 10;
        const horizontalIntent = Math.abs(swipe.dx) > Math.abs(swipe.dy) * 1.15;
        if (!enoughMovement) return;
        if (!horizontalIntent) {
          cancelSwipe();
          return;
        }
        swipe.dragging = true;
        suppressNextClick = true;
        bookPages.classList.add("is-dragging");
      }

      event.preventDefault();
      const width = bookPages.getBoundingClientRect().width || 1;
      const limitedX = Math.max(-width * .32, Math.min(width * .32, swipe.dx));
      const tilt = limitedX < 0 ? Math.max(-10, limitedX / width * 24) : Math.min(10, limitedX / width * 24);
      bookPages.style.setProperty("--drag-x", `${limitedX}px`);
      bookPages.style.setProperty("--drag-tilt", `${tilt}deg`);
    });

    bookPages.addEventListener("pointerup", event => {
      if (swipe.pointerId !== event.pointerId) return;
      if (swipe.dragging) {
        event.preventDefault();
        finishSwipe();
      } else {
        cancelSwipe();
      }
      bookPages.releasePointerCapture?.(event.pointerId);
    });

    bookPages.addEventListener("pointercancel", event => {
      if (swipe.pointerId !== event.pointerId) return;
      cancelSwipe();
    });

    bookPages.addEventListener("click", event => {
      if (suppressNextClick) {
        suppressNextClick = false;
        event.preventDefault();
        event.stopPropagation();
        return;
      }

      const imageFigure = event.target.closest(".main-art, .extra-art");
      const image = imageFigure?.querySelector("img");
      if (image) {
        openLightbox(image);
        return;
      }

      const indexButton = event.target.closest("[data-goto]");
      if (indexButton) {
        setPage(Number(indexButton.dataset.goto));
      }
    });

    document.addEventListener("keydown", event => {
      if (imageLightbox.classList.contains("is-open")) {
        if (event.key === "Escape") closeLightbox();
        return;
      }
      if (event.key === "Escape") setMenu(false);
      if (event.key === "ArrowLeft") setPage(activePage - 1);
      if (event.key === "ArrowRight") setPage(activePage + 1);
    });

    document.addEventListener("click", event => {
      if (!document.body.classList.contains("menu-open")) return;
      if (event.target.closest(".toolbar, .menu-toggle")) return;
      setMenu(false);
    });

    imageLightbox.addEventListener("click", event => {
      if (event.target === imageLightbox) closeLightbox();
    });

    lightboxClose.addEventListener("click", closeLightbox);

    window.addEventListener("beforeprint", () => {
      if (!document.body.classList.contains("print-current")) {
        document.body.classList.add("print-all");
      }
    });

    window.addEventListener("afterprint", () => {
      clearPrintMode();
      showPage(activePage);
    });
  </script>
</body>
</html>
